<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="400" height="300" fill="#f8f9fa" rx="10" />
  
  <!-- Feature Icons and Labels -->
  <g transform="translate(200, 150)">
    <!-- Camera Feature -->
    <g transform="translate(-120, -60)">
      <circle cx="0" cy="0" r="30" fill="#4dabf7" />
      <path d="M-15,-5 h30 v-10 h-30 z M-15,-5 v20 h30 v-20 z" fill="white" />
      <circle cx="0" cy="5" r="8" fill="white" />
      <text x="0" y="40" font-family="Arial" font-size="12" text-anchor="middle" fill="#343a40">Advanced Camera</text>
    </g>
    
    <!-- Battery Feature -->
    <g transform="translate(0, -60)">
      <circle cx="0" cy="0" r="30" fill="#51cf66" />
      <rect x="-15" y="-10" width="30" height="20" rx="2" fill="white" />
      <rect x="-12" y="-7" width="24" height="14" rx="1" fill="#51cf66" />
      <rect x="15" y="-5" width="5" height="10" rx="1" fill="white" />
      <text x="0" y="40" font-family="Arial" font-size="12" text-anchor="middle" fill="#343a40">Long Battery Life</text>
    </g>
    
    <!-- Performance Feature -->
    <g transform="translate(120, -60)">
      <circle cx="0" cy="0" r="30" fill="#fa5252" />
      <path d="M-10,-10 L10,10 M-10,10 L10,-10" stroke="white" stroke-width="4" />
      <circle cx="0" cy="0" r="15" fill="none" stroke="white" stroke-width="2" />
      <text x="0" y="40" font-family="Arial" font-size="12" text-anchor="middle" fill="#343a40">Fast Performance</text>
    </g>
    
    <!-- Display Feature -->
    <g transform="translate(-60, 60)">
      <circle cx="0" cy="0" r="30" fill="#fab005" />
      <rect x="-15" y="-20" width="30" height="40" rx="2" fill="white" />
      <rect x="-12" y="-17" width="24" height="34" rx="1" fill="#fab005" />
      <text x="0" y="40" font-family="Arial" font-size="12" text-anchor="middle" fill="#343a40">HD Display</text>
    </g>
    
    <!-- Storage Feature -->
    <g transform="translate(60, 60)">
      <circle cx="0" cy="0" r="30" fill="#7950f2" />
      <path d="M-15,-15 h30 v30 h-30 z" fill="none" stroke="white" stroke-width="2" />
      <path d="M-10,-10 h20 v20 h-20 z" fill="white" />
      <text x="0" y="40" font-family="Arial" font-size="12" text-anchor="middle" fill="#343a40">Large Storage</text>
    </g>
  </g>
  
  <!-- Product Title -->
  <rect x="100" y="250" width="200" height="30" rx="5" fill="#343a40" />
  <text x="200" y="270" font-family="Arial" font-size="14" text-anchor="middle" fill="white">Smartphone Features</text>
</svg>