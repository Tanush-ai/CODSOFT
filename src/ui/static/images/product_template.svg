<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="800" height="800" viewBox="0 0 800 800" xmlns="http://www.w3.org/2000/svg">
  <!-- Clean, professional background with subtle gradient -->
  <defs>
    <linearGradient id="background_gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8f9fa" />
      <stop offset="100%" stop-color="#e9ecef" />
    </linearGradient>
    
    <!-- Soft shadow for product -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="10" stdDeviation="15" flood-opacity="0.2" />
    </filter>
    
    <!-- Reflection effect -->
    <linearGradient id="reflection" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="white" stop-opacity="0.3" />
      <stop offset="100%" stop-color="white" stop-opacity="0" />
    </linearGradient>
    
    <!-- Highlight effect -->
    <radialGradient id="highlight" cx="30%" cy="30%" r="50%" fx="30%" fy="30%">
      <stop offset="0%" stop-color="white" stop-opacity="0.6" />
      <stop offset="100%" stop-color="white" stop-opacity="0" />
    </radialGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="800" fill="url(#background_gradient)" />
  
  <!-- Subtle grid pattern -->
  <path d="M 0 40 H 800 M 0 80 H 800 M 0 120 H 800 M 0 160 H 800 M 0 200 H 800 M 0 240 H 800 
           M 0 280 H 800 M 0 320 H 800 M 0 360 H 800 M 0 400 H 800 M 0 440 H 800 M 0 480 H 800
           M 0 520 H 800 M 0 560 H 800 M 0 600 H 800 M 0 640 H 800 M 0 680 H 800 M 0 720 H 800 M 0 760 H 800
           M 40 0 V 800 M 80 0 V 800 M 120 0 V 800 M 160 0 V 800 M 200 0 V 800 M 240 0 V 800
           M 280 0 V 800 M 320 0 V 800 M 360 0 V 800 M 400 0 V 800 M 440 0 V 800 M 480 0 V 800
           M 520 0 V 800 M 560 0 V 800 M 600 0 V 800 M 640 0 V 800 M 680 0 V 800 M 720 0 V 800 M 760 0 V 800"
        stroke="#e2e6ea" stroke-width="0.5" />
  
  <!-- Product container -->
  <g transform="translate(400, 400)" filter="url(#shadow)">
    <!-- Product shape (can be customized based on product type) -->
    <rect x="-200" y="-200" width="400" height="400" rx="20" fill="#ffffff" />
    
    <!-- Product details placeholder -->
    <rect x="-180" y="-180" width="360" height="240" rx="10" fill="#f1f3f5" />
    
    <!-- Product features indicators -->
    <circle cx="-120" cy="120" r="30" fill="#4dabf7" />
    <circle cx="0" cy="120" r="30" fill="#4dabf7" />
    <circle cx="120" cy="120" r="30" fill="#4dabf7" />
    
    <!-- Feature labels -->
    <text x="-120" y="125" font-family="Arial" font-size="12" text-anchor="middle" fill="white">Feature 1</text>
    <text x="0" y="125" font-family="Arial" font-size="12" text-anchor="middle" fill="white">Feature 2</text>
    <text x="120" y="125" font-family="Arial" font-size="12" text-anchor="middle" fill="white">Feature 3</text>
    
    <!-- Reflection effect -->
    <rect x="-180" y="-180" width="360" height="120" rx="10" fill="url(#reflection)" />
    
    <!-- Highlight effect -->
    <circle cx="-100" cy="-100" r="150" fill="url(#highlight)" />
  </g>
  
  <!-- Product name placeholder -->
  <rect x="250" y="650" width="300" height="40" rx="5" fill="#343a40" />
  <text x="400" y="675" font-family="Arial" font-size="18" font-weight="bold" text-anchor="middle" fill="white">Product Name</text>
  
  <!-- Price tag -->
  <g transform="translate(650, 150)">
    <rect x="-60" y="-25" width="120" height="50" rx="25" fill="#fa5252" />
    <text x="0" y="5" font-family="Arial" font-size="18" font-weight="bold" text-anchor="middle" fill="white">₹1,999.00</text>
  </g>
  
  <!-- High-quality badge -->
  <g transform="translate(150, 150)">
    <circle cx="0" cy="0" r="50" fill="#51cf66" />
    <text x="0" y="5" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle" fill="white">Premium</text>
    <text x="0" y="25" font-family="Arial" font-size="10" text-anchor="middle" fill="white">Quality</text>
  </g>
</svg>