<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="400" height="300" fill="#f8f9fa" rx="10" />
  
  <!-- Sports Shoe -->
  <g transform="translate(200, 150)">
    <!-- Shoe outline -->
    <path d="M-80,-30 C-60,-50 -20,-40 20,-30 C60,-20 80,0 80,30 C80,50 60,60 20,50 C-20,40 -60,50 -80,30 Z" fill="#51cf66" stroke="#212529" stroke-width="2" />
    
    <!-- Shoe details -->
    <path d="M-60,-20 C-40,-30 0,-25 40,-15 C60,-10 70,0 70,20 C70,35 60,40 40,35 C0,25 -40,35 -60,20 Z" fill="#f8f9fa" stroke="#212529" stroke-width="1" />
    
    <!-- Laces -->
    <line x1="-20" y1="-15" x2="20" y2="-5" stroke="#212529" stroke-width="2" />
    <line x1="-25" y1="-5" x2="15" y2="5" stroke="#212529" stroke-width="2" />
    <line x1="-30" y1="5" x2="10" y2="15" stroke="#212529" stroke-width="2" />
  </g>
  
  <!-- Product label -->
  <rect x="100" y="260" width="200" height="30" rx="5" fill="#51cf66" />
  <text x="200" y="280" font-family="Arial" font-size="14" text-anchor="middle" fill="white">Sports</text>
</svg>