<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="400" height="300" fill="#f8f9fa" rx="10" />
  
  <!-- Feature Icons and Labels -->
  <g transform="translate(200, 150)">
    <!-- Programmable Feature -->
    <g transform="translate(-120, -60)">
      <circle cx="0" cy="0" r="30" fill="#fa5252" />
      <rect x="-15" y="-15" width="30" height="30" rx="3" fill="none" stroke="white" stroke-width="2" />
      <path d="M-10,-5 h20 M-10,0 h15 M-10,5 h10" stroke="white" stroke-width="2" />
      <text x="0" y="40" font-family="Arial" font-size="12" text-anchor="middle" fill="#343a40">Programmable</text>
    </g>
    
    <!-- Thermal Carafe Feature -->
    <g transform="translate(0, -60)">
      <circle cx="0" cy="0" r="30" fill="#4dabf7" />
      <path d="M-10,-15 v30 h20 v-30 h-20" fill="none" stroke="white" stroke-width="2" />
      <path d="M-5,-10 v20 h10 v-20 h-10" fill="white" />
      <text x="0" y="40" font-family="Arial" font-size="12" text-anchor="middle" fill="#343a40">Thermal Carafe</text>
    </g>
    
    <!-- Brew Strength Feature -->
    <g transform="translate(120, -60)">
      <circle cx="0" cy="0" r="30" fill="#fab005" />
      <path d="M-15,10 h30 M-15,0 h20 M-15,-10 h10" stroke="white" stroke-width="3" />
      <text x="0" y="40" font-family="Arial" font-size="12" text-anchor="middle" fill="#343a40">Brew Strength</text>
    </g>
    
    <!-- Auto Shutoff Feature -->
    <g transform="translate(-60, 60)">
      <circle cx="0" cy="0" r="30" fill="#51cf66" />
      <circle cx="0" cy="0" r="15" fill="none" stroke="white" stroke-width="2" />
      <path d="M0,-15 v15 M0,0 L10,10" stroke="white" stroke-width="2" />
      <text x="0" y="40" font-family="Arial" font-size="12" text-anchor="middle" fill="#343a40">Auto Shutoff</text>
    </g>
    
    <!-- Water Filter Feature -->
    <g transform="translate(60, 60)">
      <circle cx="0" cy="0" r="30" fill="#7950f2" />
      <path d="M-10,-15 v30 h20 v-30 h-20" fill="none" stroke="white" stroke-width="2" />
      <path d="M-5,-5 L5,5 M-5,5 L5,-5" stroke="white" stroke-width="2" />
      <text x="0" y="40" font-family="Arial" font-size="12" text-anchor="middle" fill="#343a40">Water Filter</text>
    </g>
  </g>
  
  <!-- Product Title -->
  <rect x="100" y="250" width="200" height="30" rx="5" fill="#fa5252" />
  <text x="200" y="270" font-family="Arial" font-size="14" text-anchor="middle" fill="white">Coffee Maker Features</text>
</svg>