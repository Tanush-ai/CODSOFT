<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="400" height="300" fill="#f8f9fa" rx="10" />
  
  <!-- Watch Body -->
  <rect x="160" y="100" width="80" height="100" rx="10" fill="#212529" />
  <rect x="165" y="105" width="70" height="90" rx="5" fill="#4dabf7" />
  
  <!-- Watch Bands -->
  <path d="M160,100 L140,80 L140,50 L260,50 L260,80 L240,100" fill="#adb5bd" />
  <path d="M160,200 L140,220 L140,250 L260,250 L260,220 L240,200" fill="#adb5bd" />
  
  <!-- Watch Screen Elements -->
  <text x="200" y="130" font-family="Arial" font-size="12" text-anchor="middle" fill="white">12:45</text>
  <circle cx="185" cy="150" r="10" fill="none" stroke="white" stroke-width="2" />
  <path d="M185,150 L185,145 M185,150 L190,155" stroke="white" stroke-width="1" />
  <text x="215" y="150" font-family="Arial" font-size="10" text-anchor="middle" fill="white">10,245</text>
  <text x="215" y="160" font-family="Arial" font-size="8" text-anchor="middle" fill="white">steps</text>
  <path d="M175,175 L185,175 L195,175 L205,175 L215,175 L225,175" stroke="white" stroke-width="2" stroke-linecap="round" />
  
  <!-- Heart Rate Icon -->
  <path d="M185,185 L190,180 L195,185 L200,180 L205,185 L210,180 L215,185" fill="none" stroke="#fa5252" stroke-width="1" />
  <text x="215" y="190" font-family="Arial" font-size="8" text-anchor="middle" fill="white">72 BPM</text>
  
  <!-- Product Name -->
  <rect x="100" y="260" width="200" height="30" rx="5" fill="#4dabf7" />
  <text x="200" y="280" font-family="Arial" font-size="14" text-anchor="middle" fill="white">Smart Watch</text>
</svg>