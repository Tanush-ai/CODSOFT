<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="400" height="300" fill="#f8f9fa" rx="10" />
  
  <!-- Yoga Mat -->
  <rect x="100" y="100" width="200" height="100" rx="5" fill="#9775fa" />
  <rect x="105" y="105" width="190" height="90" rx="3" fill="#b197fc" />
  
  <!-- Mat Texture -->
  <line x1="120" y1="105" x2="120" y2="195" stroke="#9775fa" stroke-width="1" />
  <line x1="140" y1="105" x2="140" y2="195" stroke="#9775fa" stroke-width="1" />
  <line x1="160" y1="105" x2="160" y2="195" stroke="#9775fa" stroke-width="1" />
  <line x1="180" y1="105" x2="180" y2="195" stroke="#9775fa" stroke-width="1" />
  <line x1="200" y1="105" x2="200" y2="195" stroke="#9775fa" stroke-width="1" />
  <line x1="220" y1="105" x2="220" y2="195" stroke="#9775fa" stroke-width="1" />
  <line x1="240" y1="105" x2="240" y2="195" stroke="#9775fa" stroke-width="1" />
  <line x1="260" y1="105" x2="260" y2="195" stroke="#9775fa" stroke-width="1" />
  <line x1="280" y1="105" x2="280" y2="195" stroke="#9775fa" stroke-width="1" />
  
  <!-- Carrying Strap -->
  <path d="M300,150 C320,130 340,150 340,170" fill="none" stroke="#495057" stroke-width="5" />
  <path d="M300,150 C320,170 340,150 340,130" fill="none" stroke="#495057" stroke-width="5" />
  
  <!-- Product Name -->
  <rect x="100" y="260" width="200" height="30" rx="5" fill="#9775fa" />
  <text x="200" y="280" font-family="Arial" font-size="14" text-anchor="middle" fill="white">Yoga Mat</text>
</svg>