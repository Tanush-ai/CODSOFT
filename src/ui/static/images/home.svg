<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="400" height="300" fill="#f8f9fa" rx="10" />
  
  <!-- Home Appliance (Coffee Maker) -->
  <g transform="translate(200, 150)">
    <!-- Base -->
    <rect x="-70" y="30" width="140" height="20" rx="5" fill="#495057" />
    
    <!-- Body -->
    <rect x="-60" y="-50" width="120" height="80" rx="5" fill="#fa5252" />
    
    <!-- Water container -->
    <rect x="-50" y="-70" width="40" height="30" rx="5" fill="#e9ecef" stroke="#343a40" stroke-width="1" />
    
    <!-- Coffee pot -->
    <rect x="10" y="-40" width="40" height="60" rx="5" fill="#e9ecef" stroke="#343a40" stroke-width="1" />
    <rect x="15" y="-45" width="30" height="10" rx="5" fill="#e9ecef" stroke="#343a40" stroke-width="1" />
    
    <!-- Controls -->
    <circle cx="-30" cy="0" r="10" fill="#e9ecef" stroke="#343a40" stroke-width="1" />
    <rect x="-10" y="-5" width="10" height="10" rx="2" fill="#e9ecef" stroke="#343a40" stroke-width="1" />
  </g>
  
  <!-- Product label -->
  <rect x="100" y="260" width="200" height="30" rx="5" fill="#fa5252" />
  <text x="200" y="280" font-family="Arial" font-size="14" text-anchor="middle" fill="white">Home</text>
</svg>