<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="400" height="300" fill="#f8f9fa" rx="10" />
  
  <!-- Smartphone -->
  <g transform="translate(200, 150)">
    <!-- Phone body -->
    <rect x="-60" y="-100" width="120" height="200" rx="10" fill="#343a40" />
    
    <!-- Screen -->
    <rect x="-50" y="-90" width="100" height="170" rx="5" fill="#4dabf7" />
    
    <!-- Camera -->
    <circle cx="-30" cy="-80" r="5" fill="#212529" />
    
    <!-- Home button -->
    <circle cx="0" cy="90" r="10" fill="#e9ecef" stroke="#343a40" stroke-width="2" />
    
    <!-- Reflection -->
    <rect x="-50" y="-90" width="100" height="50" rx="5" fill="white" opacity="0.1" />
  </g>
  
  <!-- Product label -->
  <rect x="100" y="260" width="200" height="30" rx="5" fill="#343a40" />
  <text x="200" y="280" font-family="Arial" font-size="14" text-anchor="middle" fill="white">Electronics</text>
</svg>